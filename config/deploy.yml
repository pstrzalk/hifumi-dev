service: hifumi-dev
image: hifumi-dev

servers:
  web:
    - 77.42.95.154

proxy:
  ssl: true
  host: hifumi.dev

registry:
  server: localhost:5555

env:
  secret:
    - RAILS_MASTER_KEY
    - SMTP_PASSWORD              # Resend SMTP key today; provider-neutral name keeps swap trivial
    - GITHUB_CLIENT_SECRET
  clear:
    SOLID_QUEUE_IN_PUMA: true
    PREVIEW_DOMAIN: hifumi.dev
    HIFUMI_DEV_WORKSPACE_ROOT: /var/lib/hifumi-dev/workspaces
    GITHUB_CLIENT_ID: Ov23liLp77TT9zMsowk3
    # Operator identity for /privacy. Public-facing legal display, so values
    # live here (not .kamal/secrets). Tax ID and business URL intentionally
    # unset — /privacy will skip those lines.
    HIFUMI_OPERATOR_NAME: Paweł Strzałkowski
    HIFUMI_OPERATOR_EMAIL: p.strzalkowski@visuality.pl

volumes:
  - "hifumi_dev_storage:/rails/storage"
  - "/var/lib/hifumi-dev/workspaces:/var/lib/hifumi-dev/workspaces"
  - "/var/run/docker.sock:/var/run/docker.sock"

asset_path: /rails/public/assets

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"
