service: hifumi-dev
image: hifumi-dev

servers:
  web:
    - 77.42.95.154

proxy:
  ssl: true
  host: hifumi.dev

registry:
  server: localhost:5555

env:
  secret:
    - RAILS_MASTER_KEY
    - SMTP_PASSWORD              # Resend SMTP key today; provider-neutral name keeps swap trivial
    - GITHUB_CLIENT_SECRET
  clear:
    SOLID_QUEUE_IN_PUMA: true
    PREVIEW_DOMAIN: hifumi.dev
    # Pre-issued wildcard cert for *.preview.hifumi.dev. Paths are as seen INSIDE
    # the kamal-proxy container. Uncomment both ONLY after the cert is issued via
    # DNS-01 and mounted into kamal-proxy (see docs/05-runbooks/02-preview-wildcard-tls.md).
    # Until set, previews fall back to per-host on-demand Let's Encrypt.
    # PREVIEW_TLS_CERTIFICATE_PATH: /home/kamal-proxy/.config/kamal-proxy/preview-tls/wildcard.crt
    # PREVIEW_TLS_PRIVATE_KEY_PATH: /home/kamal-proxy/.config/kamal-proxy/preview-tls/wildcard.key
    HIFUMI_DEV_WORKSPACE_ROOT: /var/lib/hifumi-dev/workspaces
    # Image the codegen agent runs inside, per revision, as a throwaway
    # single-tenant container (Roast::Sandbox). Must be the same
    # generator image this app is deployed from, so it carries the roast gem,
    # the `claude` binary, Bundler and lib/roast. Kamal tags each release
    # `localhost:5555/hifumi-dev:latest` on the host after a successful deploy;
    # pin to a specific digest/sha if you need throwaways to track the exact
    # running release rather than the newest pushed one.
    HIFUMI_AGENT_IMAGE: localhost:5555/hifumi-dev:latest
    GITHUB_CLIENT_ID: Ov23liLp77TT9zMsowk3
    # Operator identity for /privacy. Public-facing legal display, so values
    # live here (not .kamal/secrets). Tax ID and business URL intentionally
    # unset — /privacy will skip those lines.
    HIFUMI_OPERATOR_NAME: Paweł Strzałkowski
    HIFUMI_OPERATOR_EMAIL: p.strzalkowski@visuality.pl

volumes:
  - "hifumi_dev_storage:/rails/storage"
  - "/var/lib/hifumi-dev/workspaces:/var/lib/hifumi-dev/workspaces"
  - "/var/run/docker.sock:/var/run/docker.sock"

asset_path: /rails/public/assets

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"
