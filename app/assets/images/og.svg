<?xml version="1.0" encoding="UTF-8"?>
<!--
  Source for public/og.png (1200x630, the og:image referenced from
  app/views/layouts/application.html.erb). This file is documentation +
  editable source; nothing in the app reads it at runtime.

  To regenerate the PNG (only needed if you tweak this file):
    1. brew install librsvg
    2. brew install font-noto-serif-cjk-jp   (used for the 一二三 kanji)
    3. rsvg-convert -w 1200 -h 630 app/assets/images/og.svg -o public/og.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- background: paper-100 -->
  <rect width="1200" height="630" fill="#FAF7F2"/>

  <!-- accent rule, top: rails-500 -->
  <rect x="0" y="0" width="1200" height="6" fill="#CC0000"/>

  <!-- accent rule, bottom: ink-200 -->
  <rect x="0" y="624" width="1200" height="6" fill="#C9C2B8"/>

  <!-- eyebrow: hi · fu · mi  (mono, letterspaced, ink-400) -->
  <text x="600" y="135"
        text-anchor="middle"
        font-family="Menlo, 'IBM Plex Mono', monospace"
        font-size="22"
        letter-spacing="8"
        fill="#756D62">HI &#xb7; FU &#xb7; MI</text>

  <!-- kanji: 一二三 — Noto Serif CJK JP Black, rails-600.
       Requires the font installed locally; see bin/og-regen header.
       No stroke trick: relying on the font's actual Mincho outlines. -->
  <text x="600" y="375"
        text-anchor="middle"
        font-family="'Noto Serif CJK JP Black', 'Noto Serif CJK JP', serif"
        font-weight="900"
        font-size="200"
        letter-spacing="40"
        fill="#A50000">一二三</text>

  <!-- wordmark: hifumi.dev (mono, ink-800) -->
  <text x="600" y="495"
        text-anchor="middle"
        font-family="Menlo, 'IBM Plex Mono', monospace"
        font-size="44"
        font-weight="600"
        fill="#1A1714">hifumi<tspan fill="#756D62">.dev</tspan></text>

  <!-- tagline (serif, ink-700) -->
  <text x="600" y="560"
        text-anchor="middle"
        font-family="'Source Serif 4', Georgia, serif"
        font-style="italic"
        font-size="28"
        fill="#221E18">Build Rails apps from a chat prompt.</text>
</svg>
